name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: shell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install test tools on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Install test tools on macOS
        if: runner.os == 'macOS'
        run: |
          brew install shellcheck bats-core

      - name: ShellCheck
        run: shellcheck install.sh uninstall.sh shell/agent-worktree-helpers.sh tests/smoke.sh

      - name: Smoke tests
        run: sh tests/smoke.sh

      - name: Bats tests
        run: bats tests/smoke.bats
